<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Approval Helper 設定</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Tokyo Night palette */
      --bg: #1a1b26;
      --bg-dark: #16161e;
      --card: rgba(22, 22, 30, 0.72);
      --border: rgba(122, 162, 247, 0.15);
      --text: #c0caf5;
      --muted: #a9b1d6;
      --accent: #7aa2f7;
      --green: #9ece6a;
      --red: #f7768e;
      --yellow: #e0af68;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at top, #16161e, #1a1b26);
      color: var(--text);
      min-height: 100vh;
      display:flex;
      justify-content:center;
      padding:40px 20px;
    }

    .container {
      width:100%;
      max-width:720px;
      background: var(--card);
      border:1px solid var(--border);
      border-radius:20px;
      padding:32px;
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size:24px;
      margin-bottom:8px;
      color: var(--text);
    }

    .desc { color: var(--muted); font-size:13px; margin-bottom:24px; }

    .section {
      margin-bottom:20px;
      padding:16px;
      border:1px solid var(--border);
      border-radius:14px;
      background: rgba(22,22,30,0.5);
    }

    .section-title { font-weight:600; margin-bottom:12px; color: var(--text); }

    .row { display:flex; justify-content:space-between; align-items:center; }

    input[type=text] {
      width:100%; padding:10px;
      background: var(--bg-dark);
      border:1px solid var(--border);
      color: var(--text);
      border-radius:10px;
      outline:none;
    }

    button {
      background: var(--accent);
      color:#0f0f14;
      border:none;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
    }

    .chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }

    .chip {
      background: rgba(122,162,247,0.15);
      border:1px solid rgba(122,162,247,0.25);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      display:flex;
      gap:6px;
      align-items:center;
    }

    .chip button {
      background: transparent;
      color: var(--red);
      padding:0;
    }

    .footer { display:flex; justify-content:space-between; margin-top:20px; }

    .toggle { display:flex; gap:10px; align-items:center; }
  </style>
</head>
<body>

<div class="container">
  <h1>ChatGPT Approval Helper</h1>
  <div class="desc">Tokyo Night Theme · MCP / Connector / Tool Auto Approval</div>

  <div class="section">
    <div class="row">
      <div>Auto Approve</div>
      <input type="checkbox" id="auto-approve-toggle">
    </div>
  </div>

  <div class="section">
    <div class="section-title">API Tools</div>
    <input id="tool-input" placeholder="apply_patch">
    <button id="add-tool-btn">Add</button>
    <div id="chips-list-tools" class="chips"></div>
  </div>

  <div class="section">
    <div class="section-title">MCP Servers</div>
    <input id="server-input" placeholder="MCP Server Name">
    <button id="add-server-btn">Add</button>
    <div id="chips-list-servers" class="chips"></div>
  </div>

  <div class="section">
    <div class="section-title">Connectors</div>
    <input id="connector-input" placeholder="GitHub">
    <button id="add-connector-btn">Add</button>
    <div id="chips-list-connectors" class="chips"></div>
  </div>

  <div class="footer">
    <button id="reset-btn">Reset</button>
    <div style="color:#a9b1d6;font-size:12px">Auto-save enabled</div>
  </div>
</div>

<div id="save-toast"></div>

<script src="options.js"></script>

</body>
</html>
